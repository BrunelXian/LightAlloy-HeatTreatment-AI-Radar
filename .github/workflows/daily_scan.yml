name: Daily Literature Radar Scan

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run literature radar pipeline
        run: |
          python scripts/run_pipeline.py

      - name: Export curation candidates
        run: |
          python scripts/curation_export.py --limit 20

      - name: Generate curation status
        run: |
          python scripts/curation_status.py

      - name: Run tests
        run: |
          python -m pytest tests

      - name: Upload radar outputs
        uses: actions/upload-artifact@v4
        with:
          name: literature-radar-output
          path: |
            outputs/
            data/raw/
            data/processed/
            data/checkpoints/
          retention-days: 14
